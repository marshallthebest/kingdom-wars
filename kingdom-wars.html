<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kingdom Wars</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Segoe UI',sans-serif; color:#eee; }
#canvas { display:block; }

#hud {
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  display:flex; gap:18px; background:rgba(0,0,0,0.8); padding:8px 22px;
  border-radius:12px; border:1px solid #444; font-size:14px; z-index:10; pointer-events:none;
}
.res { display:flex; align-items:center; gap:5px; }
.res-val { font-weight:bold; color:#ffd700; min-width:32px; }

#build-panel {
  position:fixed; left:12px; top:50%; transform:translateY(-50%);
  background:rgba(0,0,0,0.85); border:1px solid #445; border-radius:12px;
  padding:14px; width:190px; z-index:10;
}
#build-panel h3 { font-size:12px; color:#888; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.bld-btn {
  display:block; width:100%; padding:8px 10px; margin-bottom:7px;
  background:#1a2a4a; color:#ccd; border:1px solid #2a4a8a; border-radius:7px;
  cursor:pointer; font-size:12px; text-align:left; transition:background 0.15s;
}
.bld-btn:hover:not(:disabled) { background:#2a3a6a; }
.bld-btn:disabled { opacity:0.4; cursor:not-allowed; }
.bld-btn.active { background:#3a5a2a; border-color:#5a9a3a; }
.bld-btn .cost { color:#ffd700; font-size:11px; display:block; margin-top:2px; }
.bld-btn .tip  { color:#aaa; font-size:10px; display:block; margin-top:1px; }

#train-btn {
  display:block; width:100%; padding:9px; margin-top:8px;
  background:#4a1a1a; color:#fcc; border:1px solid #8a2a2a; border-radius:7px;
  cursor:pointer; font-size:13px; transition:background 0.15s;
}
#train-btn:hover:not(:disabled) { background:#6a2a2a; }
#train-btn:disabled { opacity:0.4; cursor:not-allowed; }

#status-panel {
  position:fixed; right:12px; top:68px;
  background:rgba(0,0,0,0.82); border:1px solid #445; border-radius:12px;
  padding:12px 14px; width:160px; z-index:10; font-size:12px;
}
#status-panel h3 { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.kdom { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.kdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

#msg { position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.8); border:1px solid #555; border-radius:8px;
  padding:7px 18px; font-size:13px; z-index:10; pointer-events:none;
  opacity:0; transition:opacity 0.3s; white-space:nowrap; }

#hint {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  color:#555; font-size:11px; pointer-events:none; z-index:5;
}

#controls-help {
  position:fixed; top:10px; right:12px;
  background:rgba(0,0,0,0.7); border:1px solid #333; border-radius:8px;
  padding:7px 12px; font-size:11px; color:#888; z-index:10; pointer-events:none; line-height:1.8;
}

#modal {
  position:fixed; inset:0; background:rgba(0,0,0,0.8);
  display:none; align-items:center; justify-content:center; z-index:100;
}
#modal-box {
  background:#12122a; border:1px solid #556; border-radius:16px;
  padding:28px 36px; text-align:center; max-width:360px; width:90%;
}
#modal-box h2 { font-size:28px; margin-bottom:12px; }
#modal-box p  { color:#aaa; margin-bottom:20px; font-size:14px; }
.mbtn { padding:10px 28px; background:#1a3a6a; color:#dde; border:1px solid #3a6aaa;
  border-radius:8px; cursor:pointer; font-size:15px; }
.mbtn:hover { background:#2a4a8a; }

#castle-hp {
  position:fixed; bottom:14px; right:12px;
  background:rgba(0,0,0,0.8); border:1px solid #556; border-radius:8px;
  padding:8px 12px; font-size:12px; z-index:10; pointer-events:none;
}
.hp-bar { width:120px; height:8px; background:#333; border-radius:4px; margin-top:4px; }
.hp-fill { height:100%; border-radius:4px; transition:width 0.3s; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="res">🪙 <span class="res-val" id="h-coins">50</span></div>
  <div class="res">🪵 <span class="res-val" id="h-wood">0</span></div>
  <div class="res">🪨 <span class="res-val" id="h-rock">0</span></div>
  <div class="res">⚔️ <span class="res-val" id="h-army">0</span></div>
</div>

<div id="build-panel">
  <h3>Build</h3>
  <button class="bld-btn" id="btn-lumbercamp" onclick="selectBuild('lumbercamp')">
    🪚 Lumbercamp
    <span class="cost">🪙30</span>
    <span class="tip">Hire lumberjacks (forest tile)</span>
  </button>
  <button class="bld-btn" id="btn-mine" onclick="selectBuild('mine')">
    ⛏️ Mine
    <span class="cost">🪙40 🪵10</span>
    <span class="tip">Dig for rock (mountain tile)</span>
  </button>
  <button class="bld-btn" id="btn-barracks" onclick="selectBuild('barracks')">
    🏰 Barracks
    <span class="cost">🪙50 🪵20 🪨10</span>
    <span class="tip">Train soldiers (grass tile)</span>
  </button>
  <hr style="border-color:#333; margin:8px 0">
  <button id="train-btn" onclick="trainSoldier()" disabled>
    🪖 Train Soldier<br><small style="color:#faa">🪙10 — approach barracks</small>
  </button>
</div>

<div id="status-panel">
  <h3>Kingdoms</h3>
  <div id="kdom-list"></div>
</div>

<div id="controls-help">
  WASD — Move<br>
  B — Cancel build<br>
  Click map — Place building
</div>

<div id="msg"></div>
<div id="hint">Collect gold coins to build your kingdom • Defend your castle!</div>

<div id="castle-hp">
  <div>🏰 Your Castle</div>
  <div class="hp-bar"><div class="hp-fill" id="castle-hp-fill" style="width:100%;background:#4a4"></div></div>
  <div id="castle-hp-text" style="color:#6f6;margin-top:2px">100 / 100</div>
</div>

<div id="modal">
  <div id="modal-box">
    <h2 id="modal-title"></h2>
    <p id="modal-msg"></p>
    <button class="mbtn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script>
'use strict';

// ─── CONSTANTS ─────────────────────────────────────────────
const GRID    = 40;
const TS      = 2.4;          // tile world size
const HALF    = (GRID * TS) / 2;
const T_GRASS = 0, T_FOREST = 1, T_MOUNTAIN = 2, T_WATER = 3;
const TCOL    = { 0:0x3d7a3d, 1:0x1a5220, 2:0x7a7060, 3:0x1a5070 };
const TH      = { 0:0.22, 1:0.32, 2:0.60, 3:0.10 };

const K_COLORS  = [0x2255cc, 0xcc2222, 0xcc8820, 0x882299];
const K_NAMES   = ['Blue','Red','Orange','Purple'];
const PLAYER_KID = 0;

// Build costs: { coins, wood, rock } and which tile type is valid
const BDATA = {
  lumbercamp: { cost:{coins:30,wood:0,rock:0}, tile:T_FOREST, income:{wood:0.4} , label:'Lumbercamp' },
  mine:       { cost:{coins:40,wood:10,rock:0},tile:T_MOUNTAIN,income:{rock:0.25},label:'Mine'       },
  barracks:   { cost:{coins:50,wood:20,rock:10},tile:T_GRASS, income:{}         , label:'Barracks'   },
};

const SOLDIER_SPEED  = 4.5;
const PLAYER_SPEED   = 7;
const CAM_OFFSET     = new THREE.Vector3(28, 34, 28);
// Isometric movement directions (camera is NE+up looking SW)
const ISO = {
  w: new THREE.Vector3(-1,0,-1).normalize(),
  s: new THREE.Vector3( 1,0, 1).normalize(),
  a: new THREE.Vector3(-1,0, 1).normalize(),
  d: new THREE.Vector3( 1,0,-1).normalize(),
};

// ─── STATE ─────────────────────────────────────────────────
let scene, camera, renderer, raycaster, mouse;
let tileMap = [];        // [z][x] → tile data
let tileMeshes = [];     // [z][x] → THREE.Mesh
let player = {};
let kingdoms = [];
let playerK = null;
let coinObjs = [];       // {mesh, collected}
let soldiers = [];       // all unit objects
let buildings = [];      // all placed buildings
let keys = {};
let buildMode = null;    // 'lumbercamp'|'mine'|'barracks'|null
let highlightMesh = null;
let hoveredTile = null;
let gameOver = false;
let msgTimer = null;
let clock = new THREE.Clock();

// ─── INIT THREE.JS ─────────────────────────────────────────
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a18);

  camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 300);
  camera.position.copy(CAM_OFFSET);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('canvas'), antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);

  scene.add(new THREE.AmbientLight(0xaabbcc, 0.65));
  const sun = new THREE.DirectionalLight(0xffe8a0, 1.3);
  sun.position.set(60,80,40); scene.add(sun);
  const fill = new THREE.DirectionalLight(0x5577aa, 0.3);
  fill.position.set(-40,30,60); scene.add(fill);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  renderer.domElement.addEventListener('click', onMapClick);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
}

// ─── MAP ───────────────────────────────────────────────────
function generateMap() {
  tileMap = []; tileMeshes = [];

  // Determine tile type
  for (let z=0; z<GRID; z++) {
    tileMap[z] = []; tileMeshes[z] = [];
    for (let x=0; x<GRID; x++) {
      let type = T_GRASS;
      const bx = x/GRID, bz = z/GRID;
      // Water border
      if (x<2||x>GRID-3||z<2||z>GRID-3) type = T_WATER;
      // Mountain ranges (diagonal stripes)
      else if (Math.sin(bx*9+1)*Math.cos(bz*7) > 0.55 && Math.random()<0.7) type = T_MOUNTAIN;
      // Forest patches
      else if (Math.sin(bx*6+2.5)*Math.sin(bz*5+1) > 0.3 && Math.random()<0.65) type = T_FOREST;

      // Clear corners for kingdoms (5x5 grass)
      const corners = [[3,3],[3,GRID-8],[GRID-8,3],[GRID-8,GRID-8]];
      if (corners.some(([cz,cx])=>Math.abs(z-cz)<5&&Math.abs(x-cx)<5)) type = T_GRASS;

      tileMap[z][x] = { x, z, type, building:null, owner:null };
    }
  }

  // Build tile meshes
  for (let z=0; z<GRID; z++) for (let x=0; x<GRID; x++) {
    const t = tileMap[z][x];
    const h = TH[t.type];
    const geo = new THREE.BoxGeometry(TS-0.08, h, TS-0.08);
    const mat = new THREE.MeshLambertMaterial({ color: TCOL[t.type] });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x*TS - HALF + TS/2, h/2, z*TS - HALF + TS/2);
    mesh.userData = { tile:t };
    scene.add(mesh);
    tileMeshes[z][x] = mesh;

    // Decorations
    if (t.type === T_FOREST) addTree(mesh.position.x, TH[T_FOREST], mesh.position.z);
    if (t.type === T_MOUNTAIN) addRock(mesh.position.x, TH[T_MOUNTAIN], mesh.position.z);
  }

  // Selection highlight
  highlightMesh = new THREE.Mesh(
    new THREE.BoxGeometry(TS, 0.06, TS),
    new THREE.MeshBasicMaterial({ color:0xffff00, transparent:true, opacity:0.6 })
  );
  highlightMesh.visible = false;
  scene.add(highlightMesh);
}

function tileToWorld(tx, tz) {
  return new THREE.Vector3(tx*TS - HALF + TS/2, 0, tz*TS - HALF + TS/2);
}

function worldToTile(wx, wz) {
  const tx = Math.floor((wx + HALF) / TS);
  const tz = Math.floor((wz + HALF) / TS);
  return { x: Math.max(0,Math.min(GRID-1,tx)), z: Math.max(0,Math.min(GRID-1,tz)) };
}

function getTile(tx, tz) {
  if (tx<0||tx>=GRID||tz<0||tz>=GRID) return null;
  return tileMap[tz][tx];
}

function addTree(wx, baseH, wz) {
  const off = (Math.random()-0.5)*0.6;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07,0.1,0.5,5),
    new THREE.MeshLambertMaterial({color:0x5c3a1e})
  );
  trunk.position.set(wx+off, baseH+0.25, wz+off*0.5);
  scene.add(trunk);
  const leaves = new THREE.Mesh(
    new THREE.ConeGeometry(0.4,0.7,6),
    new THREE.MeshLambertMaterial({color:0x1a4a1a})
  );
  leaves.position.set(wx+off, baseH+0.85, wz+off*0.5);
  scene.add(leaves);
}

function addRock(wx, baseH, wz) {
  const peak = new THREE.Mesh(
    new THREE.ConeGeometry(0.55,0.8,5),
    new THREE.MeshLambertMaterial({color:0x8a8070})
  );
  peak.position.set(wx+(Math.random()-0.5)*0.5, baseH+0.4, wz+(Math.random()-0.5)*0.5);
  scene.add(peak);
}

// ─── KINGDOMS ──────────────────────────────────────────────
const KINGDOM_STARTS = [[3,3],[3,GRID-8],[GRID-8,3],[GRID-8,GRID-8]]; // [tz,tx]

function initKingdoms() {
  kingdoms = []; soldiers = []; buildings = [];

  for (let i=0; i<4; i++) {
    const [sz,sx] = KINGDOM_STARTS[i];
    const wp = tileToWorld(sx+2, sz+2);
    const k = {
      id:i, name:K_NAMES[i], color:K_COLORS[i],
      isPlayer:i===0, isEliminated:false,
      coins:i===0?50:80, wood:0, rock:0,
      castle:null, castleHP:100, castleMaxHP:100,
      aiTimer:0, aiAttackTimer: 45 + i*15, // stagger attacks
    };
    kingdoms.push(k);
    if (i===0) playerK = k;

    // Place castle
    const castleMesh = makeCastle(wp.x, wp.z, K_COLORS[i]);
    castleMesh.userData.kingdom = i;
    castleMesh.userData.isCastle = true;
    scene.add(castleMesh);
    k.castle = castleMesh;
    k.castlePos = new THREE.Vector3(wp.x, 0, wp.z);

    // Starting soldiers for enemies
    if (i!==0) {
      for (let s=0;s<4;s++) spawnSoldier(i, wp.x+(Math.random()-0.5)*4, wp.z+(Math.random()-0.5)*4);
    } else {
      // Player starts with 5 soldiers
      for (let s=0;s<5;s++) spawnSoldier(0, wp.x+(Math.random()-0.5)*3, wp.z+(Math.random()-0.5)*3);
    }
  }
}

function makeCastle(wx, wz, color) {
  const g = new THREE.Group();
  // Base
  const base = new THREE.Mesh(new THREE.BoxGeometry(2.8,1.2,2.8),
    new THREE.MeshLambertMaterial({color:0x888880}));
  base.position.y = 0.6; g.add(base);
  // Tower
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.8,2,8),
    new THREE.MeshLambertMaterial({color:0x777770}));
  tower.position.y = 2.2; g.add(tower);
  // Roof
  const roof = new THREE.Mesh(new THREE.ConeGeometry(0.85,1,8),
    new THREE.MeshLambertMaterial({color}));
  roof.position.y = 3.7; g.add(roof);
  // Flag
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.8,4),
    new THREE.MeshLambertMaterial({color:0xaaaaaa}));
  pole.position.y = 4.6; g.add(pole);
  const flag = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.04),
    new THREE.MeshLambertMaterial({color}));
  flag.position.set(0.25,4.85,0); g.add(flag);
  g.position.set(wx, 0, wz);
  return g;
}

// ─── PLAYER ────────────────────────────────────────────────
function initPlayer() {
  const [sz,sx] = KINGDOM_STARTS[0];
  const wp = tileToWorld(sx+2, sz+2);
  const mesh = makeCharacterMesh(0x4488ff, 1.0);
  mesh.position.set(wp.x+4, 0, wp.z+4);
  scene.add(mesh);
  player = { mesh, speed:PLAYER_SPEED, hp:100, attackTimer:0 };
}

function makeCharacterMesh(color, scale) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.45*scale,0.65*scale,0.3*scale),
    new THREE.MeshLambertMaterial({color}));
  body.position.y = 0.55*scale; g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.2*scale,8,8),
    new THREE.MeshLambertMaterial({color:0xffcc99}));
  head.position.y = 1.0*scale; g.add(head);
  const lleg = new THREE.Mesh(new THREE.BoxGeometry(0.15*scale,0.4*scale,0.15*scale),
    new THREE.MeshLambertMaterial({color:new THREE.Color(color).multiplyScalar(0.7)}));
  lleg.position.set(-0.13*scale,0.2*scale,0); g.add(lleg);
  const rleg = lleg.clone(); rleg.position.x = 0.13*scale; g.add(rleg);
  return g;
}

// ─── COINS ─────────────────────────────────────────────────
function spawnCoins(count) {
  for (let i=0; i<count; i++) spawnOneCoin();
}

function spawnOneCoin() {
  // Pick random walkable tile
  let tx,tz,t;
  for (let attempt=0; attempt<50; attempt++) {
    tx = 3+Math.floor(Math.random()*(GRID-6));
    tz = 3+Math.floor(Math.random()*(GRID-6));
    t = tileMap[tz][tx];
    if (t.type!==T_WATER && !t.building) break;
  }
  const wp = tileToWorld(tx,tz);
  const coin = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22,0.22,0.08,10),
    new THREE.MeshLambertMaterial({color:0xffd700})
  );
  coin.position.set(wp.x + (Math.random()-0.5)*0.8, TH[t.type]+0.25, wp.z+(Math.random()-0.5)*0.8);
  scene.add(coin);
  coinObjs.push({ mesh:coin, collected:false });
}

// ─── SOLDIERS ──────────────────────────────────────────────
function spawnSoldier(kingdomId, wx, wz) {
  const color = K_COLORS[kingdomId];
  const mesh = makeCharacterMesh(color, 0.82);
  mesh.position.set(wx, 0, wz);
  scene.add(mesh);
  const s = {
    id: soldiers.length,
    kingdom: kingdomId,
    mesh, hp:60, maxHp:60,
    speed: SOLDIER_SPEED,
    attackRange:2.2, attackDamage:8, attackCooldown:0,
    state:'idle', // idle|follow|march|attack|guard
    target:null,
    legPhase: Math.random()*Math.PI*2,
  };
  soldiers.push(s);
  return s;
}

// ─── BUILDINGS ─────────────────────────────────────────────
function placeBuilding(tile, type, kingdomId) {
  const wp = tileToWorld(tile.x, tile.z);
  const color = K_COLORS[kingdomId];
  const h = TH[tile.type];
  let mesh;

  if (type==='lumbercamp') {
    mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.8,1.2),
      new THREE.MeshLambertMaterial({color:0x8b4513}));
    mesh.position.set(wp.x, h+0.4, wp.z);
  } else if (type==='mine') {
    mesh = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.7,1.2),
      new THREE.MeshLambertMaterial({color:0x888888}));
    mesh.position.set(wp.x, h+0.35, wp.z);
  } else if (type==='barracks') {
    mesh = new THREE.Mesh(new THREE.BoxGeometry(1.4,1.0,1.4),
      new THREE.MeshLambertMaterial({color:0xcc4444}));
    mesh.position.set(wp.x, h+0.5, wp.z);
    // Flag
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.25,0.04),
      new THREE.MeshLambertMaterial({color}));
    f.position.set(0, 0.65, 0); mesh.add(f);
  }

  scene.add(mesh);
  tile.building = type;
  tile.owner = kingdomId;
  const b = { tile, type, mesh, kingdom:kingdomId, timer:0 };
  buildings.push(b);
  return b;
}

function selectBuild(type) {
  if (buildMode === type) { buildMode=null; clearBuildHighlights(); return; }
  buildMode = type;
  clearBuildHighlights();
  document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+type)?.classList.add('active');
  showMsg(`Select a ${BDATA[type].label === 'Lumbercamp' ? 'forest' : BDATA[type].label === 'Mine' ? 'mountain' : 'grass'} tile to build`);
}

function clearBuildHighlights() {
  document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('active'));
  buildMode=null;
}

function canAffordBuild(type, k) {
  const c = BDATA[type].cost;
  return k.coins>=c.coins && k.wood>=(c.wood||0) && k.rock>=(c.rock||0);
}

function onMapClick(e) {
  if (!buildMode || gameOver) return;
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);

  const allMeshes=[];
  tileMeshes.forEach(row=>row.forEach(m=>{ if(m) allMeshes.push(m); }));
  const hits=raycaster.intersectObjects(allMeshes);
  if (!hits.length) return;

  const tile = hits[0].object.userData.tile;
  if (!tile) return;
  const bd = BDATA[buildMode];

  if (tile.type !== bd.tile) { showMsg(`Need a ${buildMode==='lumbercamp'?'forest':buildMode==='mine'?'mountain':'grass'} tile!`,'bad'); return; }
  if (tile.building) { showMsg('Tile already has a building!','bad'); return; }
  if (tile.type===T_WATER) { showMsg("Can't build on water!",'bad'); return; }
  if (!canAffordBuild(buildMode, playerK)) { showMsg("Not enough resources!",'bad'); return; }

  // Deduct cost
  const cost = bd.cost;
  playerK.coins -= cost.coins; playerK.wood -= (cost.wood||0); playerK.rock -= (cost.rock||0);

  placeBuilding(tile, buildMode, PLAYER_KID);
  showMsg(`${bd.label} built!`, 'good');
  clearBuildHighlights();
  highlightMesh.visible = false;
}

function onMouseMove(e) {
  if (!buildMode) { highlightMesh.visible=false; return; }
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const allMeshes=[];
  tileMeshes.forEach(row=>row.forEach(m=>{ if(m) allMeshes.push(m); }));
  const hits=raycaster.intersectObjects(allMeshes);
  if (!hits.length) { highlightMesh.visible=false; return; }
  const tile=hits[0].object.userData.tile;
  const bd=BDATA[buildMode];
  const valid = tile.type===bd.tile && !tile.building;
  highlightMesh.material.color.setHex(valid?0x44ff44:0xff4444);
  highlightMesh.position.set(hits[0].object.position.x, TH[tile.type]+0.04, hits[0].object.position.z);
  highlightMesh.visible=true;
}

// ─── TRAIN SOLDIER ─────────────────────────────────────────
function trainSoldier() {
  if (playerK.coins<10 || gameOver) return;
  // Find a player barracks
  const b = buildings.find(b=>b.kingdom===PLAYER_KID && b.type==='barracks');
  if (!b) { showMsg('No barracks!','bad'); return; }
  playerK.coins-=10;
  const wp=tileToWorld(b.tile.x,b.tile.z);
  spawnSoldier(PLAYER_KID,wp.x+(Math.random()-0.5)*2,wp.z+(Math.random()-0.5)*2);
  showMsg('Soldier trained!','good');
}
window.trainSoldier=trainSoldier;

// ─── NEAR BARRACKS CHECK ───────────────────────────────────
function isNearPlayerBarracks() {
  const pp=player.mesh.position;
  return buildings.some(b=>{
    if (b.kingdom!==PLAYER_KID||b.type!=='barracks') return false;
    return pp.distanceTo(b.mesh.position)<5;
  });
}

// ─── HELPERS ───────────────────────────────────────────────
function showMsg(text, type='') {
  const el=document.getElementById('msg');
  el.textContent=text;
  el.style.color = type==='bad'?'#f77':type==='good'?'#7f7':'#eee';
  el.style.opacity=1;
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>el.style.opacity=0,2500);
}

function isWalkable(wx,wz) {
  const {x:tx,z:tz}=worldToTile(wx,wz);
  const t=getTile(tx,tz);
  return t && t.type!==T_WATER;
}

// ─── UPDATE ────────────────────────────────────────────────
function update(dt) {
  if (gameOver) return;

  updatePlayer(dt);
  updateSoldiers(dt);
  updateBuildings(dt);
  updateCoins();
  updateEnemyAI(dt);
  updateUI();
  checkWinLose();
}

function updatePlayer(dt) {
  const p = player.mesh.position;
  const move = new THREE.Vector3();
  if (keys['w']||keys['arrowup'])    move.add(ISO.w);
  if (keys['s']||keys['arrowdown'])  move.add(ISO.s);
  if (keys['a']||keys['arrowleft'])  move.add(ISO.a);
  if (keys['d']||keys['arrowright']) move.add(ISO.d);

  if (move.lengthSq()>0) {
    move.normalize().multiplyScalar(player.speed*dt);
    const nx=p.x+move.x, nz=p.z+move.z;
    if (isWalkable(nx,nz)) { p.x=nx; p.z=nz; }
    // Face direction
    player.mesh.rotation.y = Math.atan2(move.x,move.z);
    // Bob legs
    player.legPhase=(player.legPhase||0)+dt*8;
    const legs=player.mesh.children;
    if (legs[2]) legs[2].position.y=0.2+Math.sin(player.legPhase)*0.08;
    if (legs[3]) legs[3].position.y=0.2-Math.sin(player.legPhase)*0.08;
  }

  // Camera follows player
  camera.position.set(p.x+CAM_OFFSET.x, CAM_OFFSET.y, p.z+CAM_OFFSET.z);
  camera.lookAt(p.x, 1, p.z);

  // Player auto-attack nearby enemies
  player.attackTimer -= dt;
  if (player.attackTimer<=0) {
    const nearEnemy = soldiers.find(s=>s.kingdom!==PLAYER_KID && s.hp>0 && player.mesh.position.distanceTo(s.mesh.position)<2.5);
    if (nearEnemy) { nearEnemy.hp -= 20; player.attackTimer=0.6; }
    else player.attackTimer=0.1;
  }
}

function updateSoldiers(dt) {
  const pp = player.mesh.position;
  const dead = [];

  for (const s of soldiers) {
    if (s.hp<=0) { dead.push(s); continue; }

    s.attackCooldown=Math.max(0,s.attackCooldown-dt);
    const sp=s.mesh.position;

    if (s.kingdom===PLAYER_KID) {
      // Follow player if within 18 units, else guard castle
      const distToPlayer=sp.distanceTo(pp);
      const castlePos=playerK.castlePos;
      if (distToPlayer<18) {
        // Move toward player but keep some distance
        if (distToPlayer>2.5) {
          const dir=new THREE.Vector3().subVectors(pp,sp).setY(0).normalize();
          sp.x+=dir.x*s.speed*dt; sp.z+=dir.z*s.speed*dt;
          s.mesh.rotation.y=Math.atan2(dir.x,dir.z);
        }
      } else {
        // Return toward castle
        if (sp.distanceTo(castlePos)>6) {
          const dir=new THREE.Vector3().subVectors(castlePos,sp).setY(0).normalize();
          sp.x+=dir.x*s.speed*dt; sp.z+=dir.z*s.speed*dt;
        }
      }
      // Attack nearby enemies
      if (s.attackCooldown<=0) {
        const enemy=soldiers.find(e=>e.kingdom!==PLAYER_KID&&e.hp>0&&sp.distanceTo(e.mesh.position)<s.attackRange);
        if (enemy) { enemy.hp-=s.attackDamage; s.attackCooldown=1.0; }
        // Also attack enemy castles
        const ek=kingdoms.find(k=>!k.isPlayer&&!k.isEliminated&&sp.distanceTo(k.castlePos)<3.5);
        if (ek) { ek.castleHP=Math.max(0,ek.castleHP-3*dt); }
      }
    } else {
      // Enemy: march to player's castle or fight nearby friendlies
      if (s.state==='march') {
        const target=playerK.castlePos;
        const dist=sp.distanceTo(target);
        if (dist>2.5) {
          const dir=new THREE.Vector3().subVectors(target,sp).setY(0).normalize();
          sp.x+=dir.x*s.speed*dt; sp.z+=dir.z*s.speed*dt;
          s.mesh.rotation.y=Math.atan2(dir.x,dir.z);
        } else {
          // Attack castle
          if (s.attackCooldown<=0) {
            playerK.castleHP=Math.max(0,playerK.castleHP-5*dt);
            s.attackCooldown=0.5;
          }
        }
      } else {
        // Guard near own castle
        const homeCastle=kingdoms[s.kingdom].castlePos;
        if (sp.distanceTo(homeCastle)>8) {
          const dir=new THREE.Vector3().subVectors(homeCastle,sp).setY(0).normalize();
          sp.x+=dir.x*s.speed*0.5*dt; sp.z+=dir.z*s.speed*0.5*dt;
        }
      }
      // Attack nearby friendlies/player
      if (s.attackCooldown<=0) {
        const friend=soldiers.find(f=>f.kingdom===PLAYER_KID&&f.hp>0&&sp.distanceTo(f.mesh.position)<s.attackRange);
        if (friend) { friend.hp-=s.attackDamage; s.attackCooldown=1.0; }
        if (sp.distanceTo(pp)<s.attackRange) { player.hp=Math.max(0,player.hp-5); s.attackCooldown=1.0; }
      }
    }

    // Leg animation when moving
    s.legPhase=(s.legPhase||0)+dt*6;
    if (s.mesh.children[2]) s.mesh.children[2].position.y=0.2+Math.sin(s.legPhase)*0.07;
    if (s.mesh.children[3]) s.mesh.children[3].position.y=0.2-Math.sin(s.legPhase)*0.07;
  }

  // Remove dead soldiers
  for (const d of dead) {
    scene.remove(d.mesh);
    soldiers.splice(soldiers.indexOf(d),1);
  }
}

function updateBuildings(dt) {
  for (const b of buildings) {
    const k=kingdoms[b.kingdom];
    if (k.isEliminated) continue;
    const inc=BDATA[b.type].income;
    if (inc.wood)  k.wood  += inc.wood  * dt;
    if (inc.rock)  k.rock  += inc.rock  * dt;
    // Building animation
    b.mesh.rotation.y += dt * (b.type==='lumbercamp'?0.3:b.type==='mine'?0.1:0);
  }
}

function updateCoins() {
  const pp=player.mesh.position;
  for (const c of coinObjs) {
    if (c.collected) continue;
    c.mesh.rotation.y += 0.05;
    c.mesh.position.y = TH[T_GRASS]+0.25 + Math.sin(Date.now()*0.003+c.mesh.position.x)*0.08;
    if (pp.distanceTo(c.mesh.position)<1.1) {
      c.collected=true;
      scene.remove(c.mesh);
      playerK.coins++;
      // Spawn replacement after delay
      setTimeout(spawnOneCoin, 8000+Math.random()*12000);
    }
  }
  // Prune collected
  for (let i=coinObjs.length-1;i>=0;i--) { if(coinObjs[i].collected) coinObjs.splice(i,1); }
}

function updateEnemyAI(dt) {
  for (const k of kingdoms) {
    if (k.isPlayer||k.isEliminated) continue;
    k.aiTimer+=dt;
    k.aiAttackTimer-=dt;

    // Passive income
    k.coins+=0.8*dt; k.wood+=0.3*dt; k.rock+=0.2*dt;

    // Build barracks when enough resources
    if (k.aiTimer>20) {
      k.aiTimer=0;
      const [sz,sx]=KINGDOM_STARTS[k.id];
      // Look for a nearby grass tile to build barracks
      if (k.coins>=50&&k.wood>=20&&k.rock>=10) {
        const candidates=[];
        for (let dz=-3;dz<=3;dz++) for(let dx=-3;dx<=3;dx++) {
          const t=getTile(sx+dx,sz+dz);
          if(t&&t.type===T_GRASS&&!t.building) candidates.push(t);
        }
        if (candidates.length) {
          const t=candidates[Math.floor(Math.random()*candidates.length)];
          placeBuilding(t,'barracks',k.id);
          k.coins-=50; k.wood-=20; k.rock-=10;
        }
      }
      // Train soldiers
      if (k.coins>=10) {
        const n=Math.min(4,Math.floor(k.coins/10));
        const [csz,csx]=KINGDOM_STARTS[k.id];
        const wp=tileToWorld(csx+2,csz+2);
        for(let i=0;i<n;i++) spawnSoldier(k.id,wp.x+(Math.random()-0.5)*4,wp.z+(Math.random()-0.5)*4);
        k.coins-=n*10;
      }
    }

    // Attack! Send soldiers marching
    if (k.aiAttackTimer<=0) {
      k.aiAttackTimer=40+Math.random()*30;
      const armySize=soldiers.filter(s=>s.kingdom===k.id&&s.hp>0).length;
      if (armySize>=3) {
        soldiers.filter(s=>s.kingdom===k.id).forEach(s=>s.state='march');
        showMsg(`⚔️ ${k.name} Kingdom is attacking!`,'bad');
      }
    }
  }
}

// ─── CASTLE HP VISUAL ──────────────────────────────────────
function updateCastleHP() {
  const pct=playerK.castleHP/playerK.castleMaxHP;
  document.getElementById('castle-hp-fill').style.width=(pct*100)+'%';
  document.getElementById('castle-hp-fill').style.background=pct>0.5?'#4a4':pct>0.25?'#aa4':'#a44';
  document.getElementById('castle-hp-text').textContent=
    Math.ceil(playerK.castleHP)+' / '+playerK.castleMaxHP;
  document.getElementById('castle-hp-text').style.color=pct>0.5?'#6f6':pct>0.25?'#ff6':'#f66';
}

// ─── WIN / LOSE ─────────────────────────────────────────────
function checkWinLose() {
  // Enemies eliminated?
  for (const k of kingdoms) {
    if (!k.isPlayer&&!k.isEliminated&&k.castleHP<=0) {
      k.isEliminated=true;
      scene.remove(k.castle);
      soldiers.filter(s=>s.kingdom===k.id).forEach(s=>{ scene.remove(s.mesh); });
      soldiers = soldiers.filter(s=>s.kingdom!==k.id);
      showMsg(`${k.name} Kingdom destroyed!`,'good');
    }
  }
  if (kingdoms.filter(k=>!k.isPlayer&&!k.isEliminated).length===0) {
    gameOver=true;
    document.getElementById('modal-title').textContent='🏆 Victory!';
    document.getElementById('modal-msg').textContent='You conquered all enemy kingdoms and rule the realm!';
    document.getElementById('modal').style.display='flex';
    return;
  }
  if (playerK.castleHP<=0) {
    gameOver=true;
    document.getElementById('modal-title').textContent='💀 Defeated';
    document.getElementById('modal-msg').textContent='Your castle has fallen. The realm belongs to your enemies.';
    document.getElementById('modal').style.display='flex';
  }
}

// ─── UI ────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('h-coins').textContent=Math.floor(playerK.coins);
  document.getElementById('h-wood').textContent=Math.floor(playerK.wood);
  document.getElementById('h-rock').textContent=Math.floor(playerK.rock);
  document.getElementById('h-army').textContent=soldiers.filter(s=>s.kingdom===PLAYER_KID&&s.hp>0).length;

  // Train button
  const nearB=isNearPlayerBarracks();
  const trainBtn=document.getElementById('train-btn');
  trainBtn.disabled=!nearB||playerK.coins<10;

  // Build buttons affordability
  for (const [type,bd] of Object.entries(BDATA)) {
    const btn=document.getElementById('btn-'+type);
    if (btn) btn.disabled=!canAffordBuild(type,playerK);
  }

  // Kingdom status
  document.getElementById('kdom-list').innerHTML=kingdoms.map(k=>`
    <div class="kdom" style="${k.isEliminated?'opacity:0.35;text-decoration:line-through':''}">
      <div class="kdot" style="background:#${k.color.toString(16).padStart(6,'0')}"></div>
      <div style="font-size:11px">
        <div>${k.isPlayer?'👑 ':''}<b>${k.name}</b></div>
        <div style="color:#666">⚔️${soldiers.filter(s=>s.kingdom===k.id&&s.hp>0).length} 🏰${Math.ceil(k.castleHP)}hp</div>
      </div>
    </div>
  `).join('');

  updateCastleHP();
}

// ─── INPUT ─────────────────────────────────────────────────
window.addEventListener('keydown', e=>{
  keys[e.key.toLowerCase()]=true;
  if (e.key.toLowerCase()==='b') { clearBuildHighlights(); highlightMesh.visible=false; }
});
window.addEventListener('keyup',  e=>{ keys[e.key.toLowerCase()]=false; });

// ─── GLOBAL FUNCTION EXPOSURE ──────────────────────────────
window.selectBuild=selectBuild;
window.restartGame=function() {
  document.getElementById('modal').style.display='none';
  // Clear scene objects
  soldiers.forEach(s=>scene.remove(s.mesh));
  buildings.forEach(b=>scene.remove(b.mesh));
  kingdoms.forEach(k=>{ if(k.castle)scene.remove(k.castle); });
  coinObjs.forEach(c=>scene.remove(c.mesh));
  tileMeshes.forEach(row=>row.forEach(m=>{ if(m)scene.remove(m); }));
  scene.remove(player.mesh);
  soldiers=[]; buildings=[]; kingdoms=[]; coinObjs=[]; tileMap=[]; tileMeshes=[];
  keys={}; buildMode=null; gameOver=false;
  generateMap(); initKingdoms(); initPlayer(); spawnCoins(80);
  updateUI();
};

// ─── ANIMATION LOOP ────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  update(dt);
  renderer.render(scene,camera);
}

// ─── BOOT ──────────────────────────────────────────────────
initThree();
generateMap();
initKingdoms();
initPlayer();
spawnCoins(80);
updateUI();
animate();
</script>
